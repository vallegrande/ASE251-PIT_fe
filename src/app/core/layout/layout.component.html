<div class="layout">
  <!-- ─── Overlay (mobile) ─── -->
  <div class="sidebar-overlay" [class.visible]="sidebarOpen" (click)="closeSidebar()"></div>

  <!-- ─── Sidebar ─── -->
  <aside class="sidebar" [class.open]="sidebarOpen">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <!-- Leaf / sprout icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 8c.7-1 1-2.2 1-3.5C18 2.5 16.5 1 14.5 1c-1 0-2 .5-2.5 1.2C11.5 1.5 10.5 1 9.5 1 7.5 1 6 2.5 6 4.5c0 1.3.3 2.5 1 3.5"/>
          <path d="M12 22V10"/>
          <path d="M7 15c-1.5-1-3-3.5-3-6 0 0 3-.5 5 1"/>
          <path d="M17 15c1.5-1 3-3.5 3-6 0 0-3-.5-5 1"/>
          <path d="M12 10c-2-1.5-5-1-5-1s.5 3 2 5"/>
          <path d="M12 10c2-1.5 5-1 5-1s-.5 3-2 5"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-title">CamoteApp</span>
        <span class="brand-subtitle">Monitoreo Agrícola</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <!-- Dashboard / grid icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Dashboard</span>
      </a>

      <a routerLink="/parcelas" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <!-- Layers / parcelas icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 2 7 12 12 22 7 12 2"/>
          <polyline points="2 17 12 22 22 17"/>
          <polyline points="2 12 12 17 22 12"/>
        </svg>
        <span>Parcelas</span>
      </a>

      <a routerLink="/alertas" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <!-- Bell / alertas icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span>Alertas</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 16v-4"/>
        <path d="M12 8h.01"/>
      </svg>
      <span>CamoteApp v1.0</span>
    </div>
  </aside>

  <!-- ─── Main Content ─── -->
  <main class="main">
    <header class="top-bar">
      <!-- Hamburger button (mobile only) -->
      <button class="hamburger" (click)="toggleSidebar()" aria-label="Abrir menú">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <div class="top-bar-title">
        <h2>Sistema de Monitoreo</h2>
        <span class="top-bar-sep">—</span>
        <span class="top-bar-sub">Chacra de Camote</span>
      </div>
      <div class="top-bar-status">
        <span class="status-dot"></span>
        En línea
      </div>
    </header>

    <!-- Page Content -->
    <section class="content">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>

<!-- Global Toasts -->
<app-toast></app-toast>
