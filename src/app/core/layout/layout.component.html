<div class="layout" [class.sidebar-collapsed]="sidebarCollapsed">
  <!-- Overlay para móvil -->
  <div class="mobile-overlay" [class.active]="mobileMenuOpen" (click)="toggleMobileMenu()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" [class.mobile-open]="mobileMenuOpen">
    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <i class="bi bi-flower2"></i>
      </div>
      <div class="brand-text">
        <h1>CAMOTE</h1>
        <p>Riesgos Agrícolas</p>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="nav">
      <span class="nav-label">MENÚ PRINCIPAL</span>
      <a *ngFor="let item of menuItems"
         [routerLink]="item.path"
         routerLinkActive="active"
         (click)="mobileMenuOpen = false"
         class="nav-item">
        <i class="bi" [ngClass]="item.icon"></i>
        <span class="nav-text">{{ item.label }}</span>
      </a>
    </nav>

    <!-- User Info (bottom) -->
    <div class="sidebar-footer">
      <div class="user-card" *ngIf="currentUser">
        <div class="user-avatar">{{ getInitials() }}</div>
        <div class="user-info">
          <span class="user-name">{{ currentUser.nombreCompleto }}</span>
          <span class="user-role">{{ currentUser.rol }}</span>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()" title="Cerrar sesión">
        <i class="bi bi-box-arrow-left"></i>
        <span class="nav-text">Salir</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <!-- Header / Navbar -->
    <header class="header">
      <div class="header-left">
        <button class="menu-toggle" (click)="toggleMobileMenu()">
          <i class="bi bi-list"></i>
        </button>
        <button class="sidebar-toggle" (click)="toggleSidebar()">
          <i class="bi" [ngClass]="sidebarCollapsed ? 'bi-chevron-right' : 'bi-chevron-left'"></i>
        </button>
        <div class="header-title">
          <h1>Sistema de Monitoreo de Riesgos</h1>
          <span class="header-subtitle">Chacra de Camote</span>
        </div>
      </div>

      <div class="header-right">
        <div class="header-badge">
          <i class="bi bi-circle-fill status-dot"></i>
          Producción
        </div>
        <div class="header-user" *ngIf="currentUser">
          <div class="header-avatar">{{ getInitials() }}</div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <section class="content">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
