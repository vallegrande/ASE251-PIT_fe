<article class="stat-card" [ngClass]="'tone-' + tone">
  <div class="stat-icon">
    <i class="bi" [ngClass]="icon"></i>
  </div>
  <div class="stat-body">
    <p class="stat-label">{{ label }}</p>
    <h3 class="stat-value">{{ value }}</h3>
    <p class="stat-hint" *ngIf="hint">{{ hint }}</p>
  </div>
</article>
