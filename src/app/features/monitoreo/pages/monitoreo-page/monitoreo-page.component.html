<section class="animate-fade-in">
  <!-- Header -->
  <div class="page-header">
    <h2><i class="bi bi-thermometer-half"></i> Monitoreo Ambiental</h2>
    <button class="btn-primary" (click)="showForm = !showForm">
      <i class="bi" [ngClass]="showForm ? 'bi-x-lg' : 'bi-plus-lg'"></i>
      {{ showForm ? 'Cancelar' : 'Nuevo Registro' }}
    </button>
  </div>

  <!-- Create Form -->
  <div class="panel" *ngIf="showForm">
    <h3><i class="bi bi-clipboard-data"></i> Registrar Monitoreo</h3>

    <form (ngSubmit)="create()" class="create-form">
      <label>
        Parcela *
        <select [(ngModel)]="model.parcela.id" name="parcelaId" required>
          <option *ngFor="let parcela of parcelas" [ngValue]="parcela.id">
            {{ parcela.nombre }}
          </option>
        </select>
      </label>

      <label>
        Temperatura (°C)
        <input type="number" step="0.1" [(ngModel)]="model.temperatura" name="temperatura"
               placeholder="Ej: 25.5" />
      </label>

      <label>
        Humedad (%)
        <input type="number" step="0.1" [(ngModel)]="model.humedad" name="humedad"
               placeholder="Ej: 65.0" />
      </label>

      <label>
        Precipitación (mm)
        <input type="number" step="0.1" [(ngModel)]="model.precipitacion" name="precipitacion"
               placeholder="Ej: 12.3" />
      </label>

      <label>
        Velocidad Viento (km/h)
        <input type="number" step="0.1" [(ngModel)]="model.velocidadViento" name="velocidadViento"
               placeholder="Ej: 8.5" />
      </label>

      <label>
        Estado
        <select [(ngModel)]="model.estado" name="estado">
          <option value="COMPLETADO">Completado</option>
          <option value="PENDIENTE">Pendiente</option>
          <option value="CANCELADO">Cancelado</option>
        </select>
      </label>

      <label class="full-width">
        Observaciones
        <textarea [(ngModel)]="model.observaciones" name="observaciones" rows="2"
                  placeholder="Notas adicionales sobre las condiciones..."></textarea>
      </label>

      <div class="form-actions full-width">
        <button type="submit" class="btn-primary">
          <i class="bi bi-check-lg"></i> Registrar
        </button>
      </div>
    </form>
  </div>

  <!-- Loading -->
  <app-loader *ngIf="loading" message="Cargando registros de monitoreo..."></app-loader>

  <!-- Error -->
  <p class="status error" *ngIf="error">
    <i class="bi bi-exclamation-circle"></i> {{ error }}
  </p>

  <!-- Monitoreo Table -->
  <div *ngIf="!loading && monitoreos.length > 0">
    <app-monitoreo-table [monitoreos]="monitoreos"></app-monitoreo-table>
  </div>

  <div class="empty-state" *ngIf="!loading && monitoreos.length === 0">
    <i class="bi bi-clipboard-x"></i>
    <p>No hay registros de monitoreo</p>
    <span>Registra tu primer monitoreo ambiental</span>
  </div>
</section>
