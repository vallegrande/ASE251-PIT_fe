<section class="animate-fade-in">
  <!-- Header -->
  <div class="page-header">
    <h2><i class="bi bi-map-fill"></i> Gestión de Parcelas</h2>
    <div class="header-actions">
      <div class="search-box">
        <i class="bi bi-search"></i>
        <input type="text" [(ngModel)]="searchQuery" name="search"
               placeholder="Buscar parcela..." (keyup.enter)="onSearch()" />
      </div>
      <button class="btn-primary" (click)="openCreate()">
        <i class="bi bi-plus-lg"></i> Nueva Parcela
      </button>
    </div>
  </div>

  <!-- Create / Edit Form -->
  <div class="panel form-panel" *ngIf="showForm">
    <h3>
      <i class="bi" [ngClass]="editingId ? 'bi-pencil-square' : 'bi-plus-circle'"></i>
      {{ editingId ? 'Editar Parcela' : 'Nueva Parcela' }}
    </h3>

    <form (ngSubmit)="save()" class="create-form">
      <label>
        Nombre *
        <input type="text" [(ngModel)]="model.nombre" name="nombre" placeholder="Nombre de la parcela" required />
      </label>

      <label>
        Ubicación *
        <input type="text" [(ngModel)]="model.ubicacion" name="ubicacion" placeholder="Ubicación geográfica" required />
      </label>

      <label>
        Área (ha) *
        <input type="number" min="0.01" step="0.01" [(ngModel)]="model.area" name="area" required />
      </label>

      <label>
        Estado
        <select [(ngModel)]="model.estado" name="estado" required>
          <option *ngFor="let estado of estados" [value]="estado.value">{{ estado.label }}</option>
        </select>
      </label>

      <label>
        Humedad (%)
        <input type="number" min="0" max="100" step="0.1" [(ngModel)]="model.humedad" name="humedad" placeholder="Ej: 60.5" />
      </label>

      <label>
        Temperatura (°C)
        <input type="number" step="0.1" [(ngModel)]="model.temperatura" name="temperatura" placeholder="Ej: 25.0" />
      </label>

      <label>
        Fecha de Siembra
        <input type="date" [(ngModel)]="model.fechaSiembra" name="fechaSiembra" />
      </label>

      <label>
        Fecha Cosecha Estimada
        <input type="date" [(ngModel)]="model.fechaCosechaEstimada" name="fechaCosechaEstimada" />
      </label>

      <div class="form-actions full-width">
        <button type="submit" class="btn-primary">
          <i class="bi bi-check-lg"></i> {{ editingId ? 'Actualizar' : 'Guardar' }}
        </button>
        <button type="button" class="btn-secondary" (click)="cancelForm()">
          <i class="bi bi-x-lg"></i> Cancelar
        </button>
      </div>
    </form>
  </div>

  <!-- Loading -->
  <app-loader *ngIf="loading" message="Cargando parcelas..."></app-loader>

  <!-- Error -->
  <p class="status error" *ngIf="error">
    <i class="bi bi-exclamation-circle"></i> {{ error }}
  </p>

  <!-- Table -->
  <app-parcela-table
    *ngIf="!loading"
    [parcelas]="parcelas"
    (deleteParcela)="delete($event)"
    (editParcela)="openEdit($event)"
  ></app-parcela-table>
</section>
