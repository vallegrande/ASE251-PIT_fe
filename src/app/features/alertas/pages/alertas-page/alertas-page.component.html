<section class="animate-fade-in">
  <!-- Header -->
  <div class="page-header">
    <h2><i class="bi bi-exclamation-triangle-fill"></i> Gestión de Alertas</h2>
    <button class="btn-primary" (click)="showForm = !showForm">
      <i class="bi" [ngClass]="showForm ? 'bi-x-lg' : 'bi-plus-lg'"></i>
      {{ showForm ? 'Cancelar' : 'Nueva Alerta' }}
    </button>
  </div>

  <!-- Create Form -->
  <div class="panel" *ngIf="showForm">
    <h3><i class="bi bi-plus-circle"></i> Registrar Nueva Alerta</h3>

    <form (ngSubmit)="create()" class="create-form">
      <label>
        Parcela *
        <select [(ngModel)]="model.parcela.id" name="parcelaId" required>
          <option *ngFor="let parcela of parcelas" [ngValue]="parcela.id">
            {{ parcela.nombre }}
          </option>
        </select>
      </label>

      <label>
        Tipo *
        <select [(ngModel)]="model.tipo" name="tipo" required>
          <option *ngFor="let tipo of tipos" [value]="tipo">{{ tipo }}</option>
        </select>
      </label>

      <label>
        Nivel de Riesgo *
        <select [(ngModel)]="model.nivelRiesgo" name="nivelRiesgo" required>
          <option *ngFor="let nivel of niveles" [value]="nivel">{{ nivel }}</option>
        </select>
      </label>

      <label class="full-width">
        Mensaje *
        <textarea [(ngModel)]="model.mensaje" name="mensaje" rows="3"
                  placeholder="Describe la alerta de riesgo..." required></textarea>
      </label>

      <div class="form-actions full-width">
        <button type="submit" class="btn-primary">
          <i class="bi bi-check-lg"></i> Registrar Alerta
        </button>
      </div>
    </form>
  </div>

  <!-- Loading -->
  <app-loader *ngIf="loading" message="Cargando alertas..."></app-loader>

  <!-- Error -->
  <p class="status error" *ngIf="error">
    <i class="bi bi-exclamation-circle"></i> {{ error }}
  </p>

  <!-- Alert List -->
  <app-alerta-list
    *ngIf="!loading"
    [alertas]="alertas"
    (atender)="atender($event)"
    (descartar)="descartar($event)"
  ></app-alerta-list>
</section>
